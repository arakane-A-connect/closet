<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Closet</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap');

  :root {
    --cream: #faf8f5;
    --warm-white: #f5f2ed;
    --beige: #e8e0d5;
    --taupe: #c4b8a8;
    --brown: #8c7b6b;
    --dark: #2c2420;
    --accent: #c4956a;
    --accent-light: #e8d5c0;
    --green: #7a9e7e;
    --red: #c47a7a;
    --shadow: rgba(44,36,32,0.08);
    --shadow-md: rgba(44,36,32,0.14);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    background: var(--cream);
    color: var(--dark);
    min-height: 100vh;
  }

  /* ヘッダー */
  header {
    background: var(--dark);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 1.6rem;
    color: var(--cream);
    letter-spacing: 0.1em;
  }
  header h1 span {
    color: var(--accent);
    font-style: italic;
  }
  .header-actions {
    display: flex;
    gap: 8px;
  }
  .btn-icon {
    background: none;
    border: 1px solid rgba(255,255,255,0.3);
    color: var(--cream);
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 0.72rem;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-icon:hover { background: rgba(255,255,255,0.1); }

  /* タブ */
  .tabs {
    background: var(--warm-white);
    display: flex;
    border-bottom: 1px solid var(--beige);
    padding: 0 16px;
    gap: 4px;
  }
  .tab {
    padding: 14px 18px;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--taupe);
    border: none;
    background: none;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    font-family: 'Zen Kaku Gothic New', sans-serif;
  }
  .tab.active {
    color: var(--dark);
    border-bottom-color: var(--accent);
  }
  .tab .count {
    display: inline-block;
    background: var(--beige);
    color: var(--brown);
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 0.72rem;
    margin-left: 5px;
  }
  .tab.active .count {
    background: var(--accent-light);
    color: var(--accent);
  }

  /* フィルター */
  .filter-bar {
    padding: 12px 16px;
    background: var(--warm-white);
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid var(--beige);
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-chip {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--beige);
    background: white;
    font-size: 0.78rem;
    color: var(--brown);
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Zen Kaku Gothic New', sans-serif;
  }
  .filter-chip.active {
    background: var(--dark);
    color: white;
    border-color: var(--dark);
  }

  /* グリッド */
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    padding: 16px;
  }
  @media (min-width: 480px) {
    .grid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (min-width: 768px) {
    .grid { grid-template-columns: repeat(4, 1fr); }
  }

  /* カード */
  .card {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 10px var(--shadow);
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--shadow-md); }

  .card-img {
    width: 100%;
    aspect-ratio: 3/4;
    object-fit: cover;
    display: block;
    background: var(--warm-white);
  }
  .card-img-placeholder {
    width: 100%;
    aspect-ratio: 3/4;
    background: linear-gradient(135deg, var(--warm-white), var(--beige));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    color: var(--taupe);
  }
  .card-body {
    padding: 10px 12px 12px;
  }
  .card-season {
    display: flex;
    gap: 3px;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }
  .season-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    display: inline-block;
  }
  .s-春 { background: #f4a7b9; }
  .s-夏 { background: #7ab8e8; }
  .s-秋 { background: #d4855a; }
  .s-冬 { background: #8fa8c8; }
  .s-オールシーズン { background: var(--green); }

  .card-type {
    font-size: 0.78rem;
    color: var(--brown);
    margin-bottom: 3px;
  }
  .card-memo {
    font-size: 0.72rem;
    color: var(--taupe);
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
  }
  .card-storage {
    margin-top: 6px;
    font-size: 0.7rem;
    background: var(--accent-light);
    color: var(--accent);
    padding: 3px 8px;
    border-radius: 6px;
    display: inline-block;
  }
  .status-badge {
    display: inline-block;
    font-size: 0.68rem;
    padding: 2px 8px;
    border-radius: 10px;
    margin-bottom: 5px;
  }
  .status-regular { background: #e8f5ea; color: var(--green); }
  .status-storage { background: var(--accent-light); color: var(--accent); }

  /* 空状態 */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--taupe);
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 16px; }
  .empty-state p { font-size: 0.9rem; line-height: 1.8; }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 58px; height: 58px;
    border-radius: 50%;
    background: var(--dark);
    color: white;
    border: none;
    font-size: 1.6rem;
    cursor: pointer;
    box-shadow: 0 4px 20px var(--shadow-md);
    transition: transform 0.2s, background 0.2s;
    z-index: 99;
    display: flex; align-items: center; justify-content: center;
  }
  .fab:hover { background: var(--accent); transform: scale(1.08); }

  /* モーダル共通 */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .overlay.open { display: flex; }

  .modal {
    background: white;
    width: 100%;
    max-width: 540px;
    max-height: 92vh;
    border-radius: 20px 20px 0 0;
    overflow-y: auto;
    padding: 24px 20px 36px;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal-handle {
    width: 40px; height: 4px;
    background: var(--beige);
    border-radius: 2px;
    margin: 0 auto 20px;
  }
  .modal h2 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: 1.4rem;
    margin-bottom: 20px;
    color: var(--dark);
  }

  /* フォーム */
  .form-group { margin-bottom: 18px; }
  .form-label {
    display: block;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--brown);
    margin-bottom: 8px;
    letter-spacing: 0.05em;
  }
  .form-label .required {
    color: var(--red);
    margin-left: 3px;
  }

  /* 写真アップロード */
  .photo-upload {
    border: 2px dashed var(--beige);
    border-radius: 12px;
    aspect-ratio: 3/4;
    max-height: 280px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    overflow: hidden;
    position: relative;
  }
  .photo-upload:hover { border-color: var(--accent); background: var(--accent-light); }
  .photo-upload img {
    width: 100%; height: 100%;
    object-fit: cover;
    position: absolute; inset: 0;
  }
  .photo-upload .upload-hint {
    text-align: center;
    color: var(--taupe);
    font-size: 0.85rem;
    line-height: 1.8;
  }
  .photo-upload .upload-hint .big { font-size: 2rem; display: block; margin-bottom: 8px; }
  #photoInput { display: none; }

  /* チップ選択 */
  .chip-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .chip {
    padding: 7px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--beige);
    background: white;
    font-size: 0.8rem;
    color: var(--brown);
    cursor: pointer;
    transition: all 0.18s;
    font-family: 'Zen Kaku Gothic New', sans-serif;
  }
  .chip:hover { border-color: var(--accent); }
  .chip.selected {
    background: var(--dark);
    color: white;
    border-color: var(--dark);
  }
  .chip.season-春.selected { background: #f4a7b9; border-color: #f4a7b9; color: white; }
  .chip.season-夏.selected { background: #7ab8e8; border-color: #7ab8e8; color: white; }
  .chip.season-秋.selected { background: #d4855a; border-color: #d4855a; color: white; }
  .chip.season-冬.selected { background: #8fa8c8; border-color: #8fa8c8; color: white; }
  .chip.season-オールシーズン.selected { background: var(--green); border-color: var(--green); color: white; }

  /* ラジオ風ボタン */
  .radio-group { display: flex; gap: 10px; flex-wrap: wrap; }
  .radio-btn {
    flex: 1;
    min-width: 120px;
    padding: 12px 8px;
    border-radius: 10px;
    border: 1.5px solid var(--beige);
    background: white;
    text-align: center;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.18s;
    font-family: 'Zen Kaku Gothic New', sans-serif;
  }
  .radio-btn .rb-icon { font-size: 1.3rem; display: block; margin-bottom: 4px; }
  .radio-btn.selected { border-color: var(--dark); background: var(--dark); color: white; }
  .radio-btn.selected-green { border-color: var(--green); background: var(--green); color: white; }

  /* テキスト入力 */
  .form-input, .form-select {
    width: 100%;
    padding: 11px 14px;
    border-radius: 10px;
    border: 1.5px solid var(--beige);
    font-size: 0.88rem;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    color: var(--dark);
    background: white;
    transition: border 0.2s;
    outline: none;
  }
  .form-input:focus, .form-select:focus { border-color: var(--accent); }

  /* 保存ボタン */
  .btn-save {
    width: 100%;
    padding: 16px;
    background: var(--dark);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 500;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 8px;
  }
  .btn-save:hover { background: var(--accent); }
  .btn-delete {
    width: 100%;
    padding: 13px;
    background: white;
    color: var(--red);
    border: 1.5px solid var(--red);
    border-radius: 12px;
    font-size: 0.88rem;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 10px;
  }
  .btn-delete:hover { background: var(--red); color: white; }
  .btn-status {
    width: 100%;
    padding: 13px;
    background: white;
    color: var(--green);
    border: 1.5px solid var(--green);
    border-radius: 12px;
    font-size: 0.88rem;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 10px;
  }
  .btn-status:hover { background: var(--green); color: white; }

  /* 詳細モーダル */
  .detail-img {
    width: 100%;
    aspect-ratio: 3/4;
    max-height: 320px;
    object-fit: cover;
    border-radius: 12px;
    margin-bottom: 16px;
    background: var(--warm-white);
  }
  .detail-img-placeholder {
    width: 100%;
    aspect-ratio: 3/4;
    max-height: 200px;
    background: var(--warm-white);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    margin-bottom: 16px;
  }
  .detail-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 10px 0;
    border-bottom: 1px solid var(--warm-white);
    font-size: 0.85rem;
  }
  .detail-row .label { color: var(--taupe); min-width: 80px; }
  .detail-row .value { color: var(--dark); text-align: right; font-weight: 500; }

  /* データ管理モーダル */
  .data-section {
    background: var(--warm-white);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .data-section h3 { font-size: 0.9rem; margin-bottom: 6px; color: var(--dark); }
  .data-section p { font-size: 0.78rem; color: var(--brown); line-height: 1.7; margin-bottom: 12px; }
  .btn-data {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    font-size: 0.88rem;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
  }
  .btn-export {
    background: var(--dark);
    color: white;
    border: none;
  }
  .btn-export:hover { background: var(--accent); }
  .btn-import {
    background: white;
    color: var(--dark);
    border: 1.5px solid var(--beige);
  }
  .btn-import:hover { border-color: var(--dark); }
  #importInput { display: none; }

  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--dark);
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 0.85rem;
    opacity: 0;
    transition: all 0.3s;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <h1>My <span>Closet</span></h1>
  <div class="header-actions">
    <button class="btn-icon" onclick="openDataModal()">📦 データ管理</button>
  </div>
</header>

<!-- タブ -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('all')" id="tab-all">
    すべて <span class="count" id="count-all">0</span>
  </button>
  <button class="tab" onclick="switchTab('regular')" id="tab-regular">
    今季レギュラー <span class="count" id="count-regular">0</span>
  </button>
  <button class="tab" onclick="switchTab('storage')" id="tab-storage">
    衣替え保管中 <span class="count" id="count-storage">0</span>
  </button>
</div>

<!-- フィルター -->
<div class="filter-bar" id="filterBar">
  <button class="filter-chip active" onclick="setFilter('all', this)">すべて</button>
  <button class="filter-chip" onclick="setFilter('春', this)">🌸 春</button>
  <button class="filter-chip" onclick="setFilter('夏', this)">☀️ 夏</button>
  <button class="filter-chip" onclick="setFilter('秋', this)">🍂 秋</button>
  <button class="filter-chip" onclick="setFilter('冬', this)">❄️ 冬</button>
  <button class="filter-chip" onclick="setFilter('オールシーズン', this)">🌿 オール</button>
  <button class="filter-chip" onclick="setFilter('トップス長袖', this)">長袖</button>
  <button class="filter-chip" onclick="setFilter('トップス半袖', this)">半袖</button>
  <button class="filter-chip" onclick="setFilter('アウター', this)">アウター</button>
  <button class="filter-chip" onclick="setFilter('パンツ', this)">パンツ</button>
  <button class="filter-chip" onclick="setFilter('スカート', this)">スカート</button>
  <button class="filter-chip" onclick="setFilter('ワンピース', this)">ワンピース</button>
  <button class="filter-chip" onclick="setFilter('シューズ', this)">シューズ</button>
  <button class="filter-chip" onclick="setFilter('バッグ', this)">バッグ</button>
</div>

<!-- グリッド -->
<div class="grid" id="grid"></div>

<!-- FAB -->
<button class="fab" onclick="openAddModal()">＋</button>

<!-- トースト -->
<div class="toast" id="toast"></div>

<!-- ===== 登録モーダル ===== -->
<div class="overlay" id="addOverlay" onclick="closeIfOverlay(event,'addOverlay')">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>洋服を登録する</h2>

    <div class="form-group">
      <label class="form-label">写真<span class="required">*</span></label>
      <div class="photo-upload" id="photoUpload" onclick="document.getElementById('photoInput').click()">
        <div class="upload-hint">
          <span class="big">👗</span>
          タップして写真を選択
        </div>
      </div>
      <input type="file" id="photoInput" accept="image/*" onchange="handlePhoto(event)">
    </div>

    <div class="form-group">
      <label class="form-label">季節（複数選択可）<span class="required">*</span></label>
      <div class="chip-group" id="seasonChips">
        <button class="chip season-春" onclick="toggleChip(this,'season')">🌸 春</button>
        <button class="chip season-夏" onclick="toggleChip(this,'season')">☀️ 夏</button>
        <button class="chip season-秋" onclick="toggleChip(this,'season')">🍂 秋</button>
        <button class="chip season-冬" onclick="toggleChip(this,'season')">❄️ 冬</button>
        <button class="chip season-オールシーズン" onclick="toggleChip(this,'season')">🌿 オールシーズン</button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">アイテム種類<span class="required">*</span></label>
      <div class="chip-group" id="typeChips">
        <button class="chip" onclick="toggleChip(this,'type',true)">トップス長袖</button>
        <button class="chip" onclick="toggleChip(this,'type',true)">トップス半袖</button>
        <button class="chip" onclick="toggleChip(this,'type',true)">アウター</button>
        <button class="chip" onclick="toggleChip(this,'type',true)">パンツ</button>
        <button class="chip" onclick="toggleChip(this,'type',true)">スカート</button>
        <button class="chip" onclick="toggleChip(this,'type',true)">ワンピース</button>
        <button class="chip" onclick="toggleChip(this,'type',true)">シューズ</button>
        <button class="chip" onclick="toggleChip(this,'type',true)">バッグ</button>
        <button class="chip" onclick="toggleChip(this,'type',true)">アクセサリー</button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">色の系統</label>
      <div class="chip-group" id="colorChips">
        <button class="chip" onclick="toggleChip(this,'color',true)">⬜ ホワイト系</button>
        <button class="chip" onclick="toggleChip(this,'color',true)">⬛ ブラック系</button>
        <button class="chip" onclick="toggleChip(this,'color',true)">🩶 グレー系</button>
        <button class="chip" onclick="toggleChip(this,'color',true)">🫐 ネイビー系</button>
        <button class="chip" onclick="toggleChip(this,'color',true)">💙 ブルー系</button>
        <button class="chip" onclick="toggleChip(this,'color',true)">❤️ レッド系</button>
        <button class="chip" onclick="toggleChip(this,'color',true)">💚 グリーン系</button>
        <button class="chip" onclick="toggleChip(this,'color',true)">🤎 ベージュ系</button>
        <button class="chip" onclick="toggleChip(this,'color',true)">🟫 ブラウン系</button>
        <button class="chip" onclick="toggleChip(this,'color',true)">🌈 カラフル</button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">ステータス</label>
      <div class="radio-group">
        <button class="radio-btn selected-green" id="rb-regular" onclick="selectStatus('regular')">
          <span class="rb-icon">👗</span>今季レギュラー
        </button>
        <button class="radio-btn" id="rb-storage" onclick="selectStatus('storage')">
          <span class="rb-icon">📦</span>衣替え保管中
        </button>
      </div>
    </div>

    <div class="form-group" id="storageGroup" style="display:none">
      <label class="form-label">収納場所</label>
      <select class="form-select" id="storageSelect">
        <option value="">選択してください</option>
        <option>クローゼット</option>
        <option>押し入れ上段</option>
        <option>押し入れ下段</option>
        <option>衣装ケース</option>
        <option>その他</option>
      </select>
      <input type="text" class="form-input" id="storageOther" placeholder="その他の場所を入力" style="display:none;margin-top:8px">
    </div>

    <div class="form-group">
      <label class="form-label">メモ</label>
      <input type="text" class="form-input" id="memoInput" placeholder="例：お気に入り、ブランド名など">
    </div>

    <button class="btn-save" onclick="saveItem()">登録する</button>
  </div>
</div>

<!-- ===== 詳細モーダル ===== -->
<div class="overlay" id="detailOverlay" onclick="closeIfOverlay(event,'detailOverlay')">
  <div class="modal" id="detailModal">
    <div class="modal-handle"></div>
    <div id="detailContent"></div>
  </div>
</div>

<!-- ===== データ管理モーダル ===== -->
<div class="overlay" id="dataOverlay" onclick="closeIfOverlay(event,'dataOverlay')">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>データ管理</h2>

    <div class="data-section">
      <h3>📤 エクスポート（バックアップ）</h3>
      <p>全データをファイルに保存します。<br>機種変更前や定期バックアップに使ってください。</p>
      <button class="btn-data btn-export" onclick="exportData()">バックアップファイルをダウンロード</button>
    </div>

    <div class="data-section">
      <h3>📥 インポート（復元）</h3>
      <p>バックアップファイルを読み込みます。<br>⚠️ 現在のデータはすべて上書きされます。</p>
      <button class="btn-data btn-import" onclick="document.getElementById('importInput').click()">バックアップファイルを選択</button>
      <input type="file" id="importInput" accept=".json" onchange="importData(event)">
    </div>

    <div class="data-section">
      <h3>📊 現在の登録数</h3>
      <p id="dataStats" style="margin-bottom:0"></p>
    </div>
  </div>
</div>

<script>
// ===== データ管理 =====
let items = JSON.parse(localStorage.getItem('closet_items') || '[]');
let currentTab = 'all';
let currentFilter = 'all';
let currentStatus = 'regular';
let currentPhoto = null;
let editingId = null;

function save() {
  localStorage.setItem('closet_items', JSON.stringify(items));
}

// ===== レンダリング =====
function render() {
  const grid = document.getElementById('grid');

  let filtered = items.filter(item => {
    if (currentTab === 'regular' && item.status !== 'regular') return false;
    if (currentTab === 'storage' && item.status !== 'storage') return false;
    if (currentFilter !== 'all') {
      const inSeason = item.seasons && item.seasons.includes(currentFilter);
      const inType = item.type === currentFilter;
      if (!inSeason && !inType) return false;
    }
    return true;
  });

  // カウント更新
  document.getElementById('count-all').textContent = items.length;
  document.getElementById('count-regular').textContent = items.filter(i=>i.status==='regular').length;
  document.getElementById('count-storage').textContent = items.filter(i=>i.status==='storage').length;

  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div class="icon">👗</div>
        <p>まだ洋服が登録されていません<br>右下の＋ボタンから追加してください</p>
      </div>`;
    return;
  }

  grid.innerHTML = filtered.map(item => `
    <div class="card" onclick="openDetail('${item.id}')">
      ${item.photo
        ? `<img class="card-img" src="${item.photo}" alt="洋服">`
        : `<div class="card-img-placeholder">👗</div>`}
      <div class="card-body">
        <div class="card-season">
          ${(item.seasons||[]).map(s=>`<span class="season-dot s-${s}" title="${s}"></span>`).join('')}
        </div>
        <div class="card-type">${item.type || '未分類'}</div>
        ${item.memo ? `<div class="card-memo">${item.memo}</div>` : ''}
        ${item.status==='storage' && item.storage
          ? `<div class="card-storage">📦 ${item.storage}</div>` : ''}
      </div>
    </div>
  `).join('');
}

// ===== タブ切り替え =====
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  render();
}

// ===== フィルター =====
function setFilter(filter, el) {
  currentFilter = filter;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  render();
}

// ===== 登録モーダル =====
function openAddModal() {
  editingId = null;
  currentPhoto = null;
  currentStatus = 'regular';
  // リセット
  document.getElementById('photoUpload').innerHTML = `<div class="upload-hint"><span class="big">👗</span>タップして写真を選択</div>`;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('selected'));
  selectStatus('regular');
  document.getElementById('memoInput').value = '';
  document.getElementById('storageSelect').value = '';
  document.getElementById('storageOther').style.display='none';
  document.getElementById('storageOther').value='';
  document.getElementById('addOverlay').classList.add('open');
}

function handlePhoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  // 画像を圧縮してbase64保存
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const maxSize = 800;
      let w = img.width, h = img.height;
      if (w > maxSize || h > maxSize) {
        if (w > h) { h = h * maxSize / w; w = maxSize; }
        else { w = w * maxSize / h; h = maxSize; }
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      currentPhoto = canvas.toDataURL('image/jpeg', 0.75);
      document.getElementById('photoUpload').innerHTML = `<img src="${currentPhoto}" alt="preview">`;
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function toggleChip(el, group, single=false) {
  if (single) {
    document.querySelectorAll(`#${group}Chips .chip`).forEach(c=>c.classList.remove('selected'));
  }
  el.classList.toggle('selected');
}

function selectStatus(status) {
  currentStatus = status;
  const rbR = document.getElementById('rb-regular');
  const rbS = document.getElementById('rb-storage');
  rbR.className = 'radio-btn' + (status==='regular' ? ' selected-green' : '');
  rbS.className = 'radio-btn' + (status==='storage' ? ' selected' : '');
  document.getElementById('storageGroup').style.display = status==='storage' ? 'block' : 'none';
}

document.getElementById('storageSelect').addEventListener('change', function() {
  document.getElementById('storageOther').style.display = this.value==='その他' ? 'block' : 'none';
});

function saveItem() {
  const seasons = [...document.querySelectorAll('#seasonChips .chip.selected')].map(c=>c.textContent.trim().replace(/^[^\s]+\s/,'').trim());
  const seasonsFull = [...document.querySelectorAll('#seasonChips .chip.selected')].map(c=>{
    const txt = c.textContent.trim();
    if (txt.includes('春')) return '春';
    if (txt.includes('夏')) return '夏';
    if (txt.includes('秋')) return '秋';
    if (txt.includes('冬')) return '冬';
    return 'オールシーズン';
  });
  const typeEl = document.querySelector('#typeChips .chip.selected');
  const colorEl = document.querySelector('#colorChips .chip.selected');
  let storage = document.getElementById('storageSelect').value;
  if (storage === 'その他') storage = document.getElementById('storageOther').value || 'その他';

  if (seasonsFull.length === 0) { showToast('季節を選択してください'); return; }
  if (!typeEl) { showToast('アイテム種類を選択してください'); return; }

  const item = {
    id: editingId || Date.now().toString(),
    photo: currentPhoto,
    seasons: seasonsFull,
    type: typeEl.textContent.trim(),
    color: colorEl ? colorEl.textContent.trim().replace(/^.\s/,'') : '',
    status: currentStatus,
    storage: currentStatus==='storage' ? storage : '',
    memo: document.getElementById('memoInput').value,
    createdAt: editingId ? (items.find(i=>i.id===editingId)||{}).createdAt : Date.now()
  };

  if (editingId) {
    const idx = items.findIndex(i=>i.id===editingId);
    if (idx !== -1) items[idx] = item;
  } else {
    items.push(item);
  }
  save();
  render();
  document.getElementById('addOverlay').classList.remove('open');
  showToast(editingId ? '更新しました ✓' : '登録しました ✓');
}

// ===== 詳細モーダル =====
function openDetail(id) {
  const item = items.find(i=>i.id===id);
  if (!item) return;
  const isStorage = item.status === 'storage';

  document.getElementById('detailContent').innerHTML = `
    ${item.photo
      ? `<img class="detail-img" src="${item.photo}" alt="洋服">`
      : `<div class="detail-img-placeholder">👗</div>`}
    <div class="detail-row">
      <span class="label">ステータス</span>
      <span class="value">
        <span class="status-badge ${isStorage?'status-storage':'status-regular'}">
          ${isStorage?'📦 衣替え保管中':'👗 今季レギュラー'}
        </span>
      </span>
    </div>
    <div class="detail-row">
      <span class="label">季節</span>
      <span class="value">${(item.seasons||[]).join('・')}</span>
    </div>
    <div class="detail-row">
      <span class="label">種類</span>
      <span class="value">${item.type||'ー'}</span>
    </div>
    <div class="detail-row">
      <span class="label">カラー</span>
      <span class="value">${item.color||'ー'}</span>
    </div>
    ${isStorage ? `
    <div class="detail-row">
      <span class="label">収納場所</span>
      <span class="value">${item.storage||'未設定'}</span>
    </div>` : ''}
    ${item.memo ? `
    <div class="detail-row">
      <span class="label">メモ</span>
      <span class="value">${item.memo}</span>
    </div>` : ''}

    <button class="btn-status" onclick="toggleStatus('${id}')">
      ${isStorage ? '👗 今季レギュラーに移す' : '📦 衣替え保管中に移す'}
    </button>
    <button class="btn-delete" onclick="deleteItem('${id}')">この洋服を削除する</button>
  `;
  document.getElementById('detailOverlay').classList.add('open');
}

function toggleStatus(id) {
  const item = items.find(i=>i.id===id);
  if (!item) return;
  item.status = item.status === 'regular' ? 'storage' : 'regular';
  save();
  render();
  document.getElementById('detailOverlay').classList.remove('open');
  showToast(item.status==='regular' ? 'レギュラーに移しました ✓' : '保管中に移しました ✓');
}

function deleteItem(id) {
  if (!confirm('この洋服を削除しますか？')) return;
  items = items.filter(i=>i.id!==id);
  save();
  render();
  document.getElementById('detailOverlay').classList.remove('open');
  showToast('削除しました');
}

// ===== データ管理 =====
function openDataModal() {
  const reg = items.filter(i=>i.status==='regular').length;
  const sto = items.filter(i=>i.status==='storage').length;
  document.getElementById('dataStats').textContent =
    `合計 ${items.length}着（今季レギュラー ${reg}着 ／ 保管中 ${sto}着）`;
  document.getElementById('dataOverlay').classList.add('open');
}

function exportData() {
  const json = JSON.stringify({ version: 1, exportedAt: new Date().toISOString(), items }, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `closet_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('バックアップを保存しました ✓');
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (!confirm('現在のデータはすべて上書きされます。よろしいですか？')) {
    e.target.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.items || !Array.isArray(data.items)) throw new Error();
      items = data.items;
      save();
      render();
      document.getElementById('dataOverlay').classList.remove('open');
      showToast(`${items.length}着を読み込みました ✓`);
    } catch {
      showToast('ファイルの読み込みに失敗しました');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
}

// ===== ユーティリティ =====
function closeIfOverlay(e, id) {
  if (e.target.id === id) document.getElementById(id).classList.remove('open');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ===== 初期化 =====
render();
</script>
</body>
</html>
